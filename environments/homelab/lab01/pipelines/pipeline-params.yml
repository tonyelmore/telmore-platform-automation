iaas: homelab
foundation: lab01
lock_pool_name: homelab-lab01
concourse_user: test
attempts: 5
concourse_credhub_server: https://concourse.lab.telmore.io:8844

github:
  repo:
    # uri: https://github.com/tonyelmore/telmore-platform-automation.git
    uri: git@github.com:tonyelmore/telmore-platform-automation.git
    branch: master
    # git_private_key |
    #   <<from secrets>>

pivnet-product:
  slug: elastic-runtime
  version: 6.0.15

s3_installation_file:
  s3_disable_ssl: true  # for Minio
  s3_skip_ssl_verification: true  # for self-signed certs
  region_name: us-west-2

pipeline_params:
  s3:
    endpoint: http://minio.lab.telmore.io
    bucket: test-bucket
    disable_ssl: true  # for Minio
    skip_ssl_verification: true  # for self-signed certs
    use_path_style: true
    region_name: us-east-1

concourse:
  team:
    product_s3_filename:
      access_key_id:
      bucket:
      endpoint:
      # Need secret access key
      skip_ssl_verification: false
      foundation_artifacts:
        bucket: foundation_runtime
        