---
resource_types:
- name: pivnet
  type: registry-image
  source:
    repository: pivotalcf/pivnet-resource
    tag: latest-final
    # username: ((dockerhub.username))
    # password: ((dockerhub.password))

resources:
# Platform Automation Toolkit from Pivnet
- name: platform-automation
  type: pivnet
  source:
    api_token: ((pivnet_token))
    product_slug: ((pipeline_params.platform_automation.slug))
    product_version: ((pipeline_params.platform_automation.version))
    # sort_by: semver

# Git repository for config
- name: config-repo
  type: git
  source:
    uri: ((pipeline_params.git.uri))
    branch: ((pipeline_params.git.branch))
    private_key: ((github-key.private-key))

# S3/Minio resources for testing
- name: test-file
  type: s3
  source:
    endpoint: ((pipeline_params.s3.endpoint))
    bucket: ((pipeline_params.s3.bucket))
    regexp: test-file-(.*).txt
    access_key_id: ((minio-key.access-key))
    secret_access_key: ((minio-key.secret-access-key))
    disable_ssl: ((pipeline_params.s3.disable_ssl))
    skip_ssl_verification: ((pipeline_params.s3.skip_ssl_verification))
    use_path_style: ((pipeline_params.s3.use_path_style))

jobs:
- name: validate-pipeline-interfaces
  serial: true
  plan:
  # Test 1: Get git repo
  - get: config-repo
    trigger: false
  
  # Test 2: Get Platform Automation resources
  - get: platform-automation-image
    resource: platform-automation
    params:
      globs: ["vsphere-platform-automation-image*.tar.gz"]
      unpack: true
  
  - get: platform-automation-tasks
    resource: platform-automation
    params:
      globs: ["platform-automation-tasks-*.zip"]
      unpack: true

  # Test 3: Create a test file and put to Minio
  - task: create-test-file
    image: platform-automation-image
    config:
      platform: linux
      outputs:
      - name: test-output
      run:
        path: bash
        args:
        - -c
        - |
          set -eu
          TIMESTAMP=$(date +%s)
          echo "Test file created at $(date)" > test-output/test-file-${TIMESTAMP}.txt
          echo "Platform Automation Toolkit test successful" >> test-output/test-file-${TIMESTAMP}.txt
          echo "Created test-file-${TIMESTAMP}.txt"
  
  - put: test-file
    params:
      file: test-output/test-file-*.txt

  # Test 4: Get the file back from Minio
  # - get: test-file
  #   passed: [test-setup]
  
  # Test 5: Prepare tasks with secrets
  - task: prepare-tasks-with-secrets
    image: platform-automation-image
    file: platform-automation-tasks/tasks/prepare-tasks-with-secrets.yml
    input_mapping:
      tasks: platform-automation-tasks
      config: config-repo
      vars: config-repo
    output_mapping:
      tasks: platform-automation-tasks-with-secrets
    params:
      CONFIG_PATHS: |
        config/environments/((pipeline_params.iaas))/((pipeline_params.foundation))/common-config
      VARS_PATHS: |
        config/environments/((pipeline_params.iaas))/common
        config/environments/((pipeline_params.iaas))/((pipeline_params.foundation))/config/defaults
        config/environments/((pipeline_params.iaas))/((pipeline_params.foundation))/config/vars
        config/environments/((pipeline_params.iaas))/((pipeline_params.foundation))/config/versions

  # Test 6: Check pending changes in TAS foundation
  - task: check-pending-changes
    image: platform-automation-image
    file: platform-automation-tasks-with-secrets/tasks/check-pending-changes.yml
    input_mapping:
      env: config-repo
    params:
      ENV_FILE: environments/((pipeline_params.iaas))/((pipeline_params.foundation))/common-config/env.yml
      # ENV_FILE: ((env_file_path))
      ALLOW_PENDING_CHANGES: true
    on_success:
      do:
      - task: report-success
        image: platform-automation-image
        config:
          platform: linux
          run:
            path: bash
            args:
            - -c
            - |
              echo "============================================"
              echo "All tests passed successfully!"
              echo "============================================"
              echo "✓ Git repository access confirmed"
              echo "✓ Platform Automation Toolkit image loaded"
              echo "✓ Platform Automation Toolkit tasks loaded"
              echo "✓ File successfully put to Minio/S3"
              echo "✓ File successfully retrieved from Minio/S3"
              echo "✓ Tasks prepared with secrets"
              echo "✓ TAS foundation pending changes checked"
              echo "============================================"
    on_failure:
      do:
      - task: report-failure
        image: platform-automation-image
        config:
          platform: linux
          run:
            path: bash
            args:
            - -c
            - |
              echo "============================================"
              echo "Test failed at check-pending-changes step"
              echo "============================================"
              echo "This may be due to:"
              echo "- Incorrect Ops Manager credentials"
              echo "- Network connectivity issues"
              echo "- Missing or incorrect ENV_FILE"
              echo "============================================"
              exit 1ping