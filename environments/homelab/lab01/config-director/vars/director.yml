# iaas_configuration:
bosh_folder_prefix: lab01_pcf
iaas_configuration_name: default
datacenter: telmore-dc
ephemeral_datastores_string: nvme-primary
persistent_datastores_string: nvme-primary
nsx_networking_enabled: false
vcenter_hostname: vcenter.lab.telmore.io

# director_configuration
director_hostname: director.lab01.lab.telmore.io
identification_tags:
  lab_id: lab01
  
# AZ Config:
az1_name: az1
az1_cluster: lab-cluster
az1_resource_pool: lab01-az1-rp

az2_name: az2
az2_cluster: lab-cluster
az2_resource_pool: lab01-az2-rp

az3_name: az3
az3_cluster: lab-cluster
az3_resource_pool: lab01-az3-rp

singleton_availability_zone: az1

# networks-configuration:
icmp_checks_enabled: true
infra_network_vsphere_name: tas1-infra
infra_network_cidr: 192.168.30.0/24
infra_network_gateway: 192.168.30.1
infra_network_reserved_ip_range: 192.168.30.0-192.168.30.10

deployment_network_vsphere_name: tas1-deployment
deployment_network_cidr: 192.168.31.0/24
deployment_network_gateway: 192.168.31.1
deployment_network_reserved_ip_range: 192.168.31.0-192.168.31.10

service_network_vsphere_name: tas1-services
service_network_cidr: 192.168.32.0/24
service_network_gateway: 192.168.32.1
service_network_reserved_ip_range: 192.168.32.1-192.168.32.10

director_disk_size_mb: "153600"
